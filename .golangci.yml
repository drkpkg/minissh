version: "2"

linters:
  default: standard
  enable:
    - misspell
    - gosec
    - revive
    - errorlint

  settings:
    gosec:
      # Launching ssh/sshpass is the application's core behavior.
      excludes:
        - G204
    revive:
      rules:
        - name: redefines-builtin-id
          severity: warning

  exclusions:
    rules:
      # User-provided import paths and local config/Termius DB/connection-log
      # reads are intentional.
      - path: internal/(sources|store|termius|connlog)/
        text: "G304"
        linters:
          - gosec
      # 0700 is the correct (tightest usable) permission for a directory,
      # not a weakness — gosec's G302 doesn't distinguish files from
      # directories when checking the "0600 or less" threshold.
      - path: internal/store/store\.go
        text: "G302"
        linters:
          - gosec
      # Fake executables on PATH for exec.LookPath in tests need the exec bit.
      - path: internal/(connect/connect|tui/session_wiring)_test\.go
        text: "G306"
        linters:
          - gosec
      # Tests reading back a log file at a path this package itself wrote
      # to (under a per-test XDG_CONFIG_HOME) — not user input.
      - path: internal/tui/(modal|session_wiring)_test\.go
        text: "G304"
        linters:
          - gosec
    paths:
      # Vendored fork of github.com/hinshun/vt10x (see third_party/vt10x/doc.go)
      # — third-party source, not held to this repo's own lint rules.
      - third_party

run:
  timeout: 5m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
