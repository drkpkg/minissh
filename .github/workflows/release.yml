name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -count=1 ./...

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "linux/arm"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            GOARM=""
            BINARY="minissh"
            ARCH_LABEL="$GOARCH"

            # 32-bit ARM targets ARMv7 (e.g. Raspberry Pi 2+ running a 32-bit OS).
            if [ "$GOARCH" = "arm" ]; then
              GOARM="7"
              ARCH_LABEL="armv7"
            fi

            ARCHIVE="minissh_${VERSION}_${GOOS}_${ARCH_LABEL}"
            STAGING="dist/${ARCHIVE}"

            if [ "$GOOS" = "windows" ]; then
              BINARY="minissh.exe"
            fi

            mkdir -p "$STAGING"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" GOARM="$GOARM" go build \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "${STAGING}/${BINARY}" \
              ./cmd/minissh

            if [ "$GOOS" = "windows" ]; then
              (cd "$STAGING" && zip -q "../${ARCHIVE}.zip" "$BINARY")
            else
              tar -czf "dist/${ARCHIVE}.tar.gz" -C "$STAGING" "$BINARY"
            fi
          done

      - name: Build Debian/Ubuntu and Arch Linux packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

          # nfpm arch values: amd64 -> deb amd64 / pacman x86_64,
          # arm64 -> deb arm64 / pacman aarch64, arm7 -> deb armhf / pacman armv7h.
          declare -A binaries=(
            ["amd64"]="dist/minissh_${VERSION}_linux_amd64/minissh"
            ["arm64"]="dist/minissh_${VERSION}_linux_arm64/minissh"
            ["arm7"]="dist/minissh_${VERSION}_linux_armv7/minissh"
          )

          mkdir -p dist/pkg-staging
          for arch in "${!binaries[@]}"; do
            cp -f "${binaries[$arch]}" dist/pkg-staging/minissh
            for pkg in deb archlinux; do
              GOARCH="$arch" nfpm package --config nfpm.yaml --packager "$pkg" --target dist/
            done
          done
          rm -rf dist/pkg-staging

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.pkg.tar.zst
          generate_release_notes: true
